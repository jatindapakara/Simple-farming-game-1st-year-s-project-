<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Farm</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="card-container">
        <div class="logo">🌱 ECO GAME! 🚜</div>
        <p class="tagline">Grow happy crops, be kind to the planet, and earn shiny eco-coins!</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Your Farmer Name" required>
            <button type="submit" class="button">Start Farming!</button>
        </form>
    </div>
</body>
</html>
