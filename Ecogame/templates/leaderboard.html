<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoGame Leaderboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="farm-page">
    <header>
        <h1 class="game-title">🏆 Top Eco Farmers 🏆</h1>
    </header>

    <div class="leaderboard-content">
        <p style="text-align: center; font-size: 18px; color: #38761d;">
            See who has the most **Eco-Coins** from selling sustainable crops!
        </p>

        <ul class="leaderboard-list">
            {% for user in leaderboard %}
                <li class="{% if user.username == current_user %}current-user{% endif %}">
                    <span class="rank">{{ loop.index }}.</span> 
                    <span class="name">{{ user.username }}</span>
                    <span class="score">{{ user.points }} 💰</span>
                </li>
            {% endfor %}
        </ul>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="{{ url_for('farm') }}" class="button">⬅️ Back to My Farm</a>
        </div>
    </div>
</body>
</html>
